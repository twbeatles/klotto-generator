name: Repo Health

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyright pytest

      - name: Check UTF-8 encoding
        run: python scripts/check_utf8.py

      - name: Run Pyright
        run: pyright --outputjson

      - name: Run pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q --ignore=tests/test_ui_shell.py

      - name: Compile Python sources
        run: python -m compileall klotto scripts run_klotto.py klottogenerator.py
